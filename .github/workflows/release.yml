name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      prerelease: ${{ steps.tag.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        id: tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "Expected release tag format vX.Y.Z or vX.Y.Z-rc.N but got: $tag" >&2
            exit 1
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          if [[ "$tag" =~ -rc\.[0-9]+$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Cargo.toml version and changelog section
        env:
          RELEASE_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          python3 - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          release_version = os.environ["RELEASE_VERSION"]

          cargo = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))
          cargo_version = cargo["package"]["version"]
          if cargo_version != release_version:
              raise SystemExit(
                  f"Tag version ({release_version}) does not match Cargo.toml ({cargo_version})"
              )

          changelog_lines = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          header_re = re.compile(r"^## \[([^\]]+)\] - ")
          start = None
          for idx, line in enumerate(changelog_lines):
              match = header_re.match(line)
              if match and match.group(1) == release_version:
                  start = idx
                  break
          if start is None:
              raise SystemExit(
                  f"Missing changelog section header for version {release_version} in CHANGELOG.md"
              )

          end = len(changelog_lines)
          for idx in range(start + 1, len(changelog_lines)):
              if changelog_lines[idx].startswith("## ["):
                  end = idx
                  break

          section = "\n".join(changelog_lines[start:end]).strip()
          if not section:
              raise SystemExit(f"Changelog section for {release_version} is empty")

          Path("release-notes.md").write_text(section + "\n", encoding="utf-8")
          PY

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  quality-gate:
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D clippy::correctness -D clippy::suspicious

      - name: Test
        run: cargo test --locked --manifest-path Cargo.toml

  msrv:
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust MSRV
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"

      - name: Build and test with lockfile
        run: cargo test --locked --manifest-path Cargo.toml

  build-artifacts:
    needs: [validate-release, quality-gate, msrv]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        shell: bash
        run: cargo build --locked --release --bin navix --target "${{ matrix.target }}"

      - name: Verify navix version flag
        shell: bash
        run: |
          expected="navix ${GITHUB_REF_NAME#v}"
          actual="$(target/${{ matrix.target }}/release/navix --version | tr -d '\r')"
          if [[ "${actual}" != "${expected}" ]]; then
            echo "Expected '${expected}' but got '${actual}' from --version" >&2
            exit 1
          fi

      - name: Package archive
        shell: bash
        run: |
          archive_name="navix-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          stage_dir="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/navix" "${stage_dir}/navix"
          if [[ -f LICENSE ]]; then
            cp LICENSE "${stage_dir}/LICENSE"
          fi
          if [[ -f README.md ]]; then
            cp README.md "${stage_dir}/README.md"
          fi

          tar_items=(navix)
          if [[ -f "${stage_dir}/LICENSE" ]]; then
            tar_items+=(LICENSE)
          fi
          if [[ -f "${stage_dir}/README.md" ]]; then
            tar_items+=(README.md)
          fi
          tar -C "${stage_dir}" -czf "${archive_name}" "${tar_items[@]}"
          rm -rf "${stage_dir}"

      - name: Validate archive layout
        shell: bash
        run: |
          archive_name="navix-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          if ! tar -tzf "${archive_name}" | awk '$0=="navix"{found=1} END{exit found?0:1}'; then
            echo "Expected root-level navix entry missing from ${archive_name}" >&2
            tar -tzf "${archive_name}" >&2
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: navix-${{ matrix.target }}
          path: navix-*-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: [validate-release, build-artifacts]
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: navix-*
          path: artifacts
          merge-multiple: true

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: release-notes

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Navix ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ needs.validate-release.outputs.prerelease == 'true' }}
          body_path: release-notes/release-notes.md
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt
